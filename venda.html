<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Vendas - Encantos Rio</title>
  <link rel="stylesheet" href="style.css">
</head>

<body onload="verificarLogin(); listarVendas()">

<header class="cabecalho-site">
  <div class="container cabecalho-conteudo">
    <div class="logo-nome">
      <img src="img/logo.png" class="logo">
      <h1>Encantos Rio</h1>
    </div>

    <nav class="menu-principal">
      <a href="admin.html">Painel</a>
      <a href="cliente.html">Clientes</a>
      <a href="passeio.html">Passeios</a>
      <a href="venda.html">Vendas</a>
      <a href="#" class="btn-admin-link" onclick="logout()">Sair</a>
    </nav>
  </div>
</header>

<section class="secao secao-clara">
  <div class="container">

    <div class="card-admin-central">
      <div class="card-admin-topo">
        <h2>Cadastro de Vendas</h2>
      </div>

      <div class="card-admin-form">

        <div class="form-grid-2">
          <div class="campo-form">
            <label>ID Cliente</label>
            <input type="number" id="clienteVenda">
          </div>

          <div class="campo-form">
            <label>ID Passeio</label>
            <input type="number" id="passeioVenda">
          </div>

          <div class="campo-form">
            <label>Quantidade</label>
            <input type="number" id="quantidadeVenda">
          </div>

          <div class="campo-form">
            <label>Tipo Ingresso</label>
            <select id="tipoIngressoVenda">
              <option>ADULTO</option>
              <option>CRIANCA</option>
            </select>
          </div>

          <div class="campo-form">
            <label>Valor Total</label>
            <input type="number" id="valorVenda">
          </div>

          <div class="campo-form">
            <label>Status</label>
            <select id="statusVenda">
              <option>PAGO</option>
              <option>PENDENTE</option>
              <option>PARCIAL</option>
              <option>CANCELADO</option>
            </select>
          </div>
        </div>

        <div class="acoes-login">
          <button class="btn-padrao" onclick="salvarVenda()">Salvar</button>
        </div>

      </div>
    </div>

    <div class="card-admin-central espacamento-topo">
      <div class="card-admin-topo">
        <h2>Lista de Vendas</h2>
      </div>

      <div class="card-admin-form">
        <div class="tabela-wrapper">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Cliente</th>
                <th>Passeio</th>
                <th>Qtd</th>
                <th>Tipo</th>
                <th>Valor</th>
                <th>Status</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="tabelaVendas"></tbody>
          </table>
        </div>
      </div>
    </div>

  </div>
</section>

<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Clientes - Encantos Rio</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body onload="verificarLogin(); listarClientes()">

<header class="cabecalho-site">
  <div class="container cabecalho-conteudo">
    <div class="logo-nome">
      <img src="img/logo.png" class="logo">
      <h1>Encantos Rio</h1>
    </div>

    <nav class="menu-principal">
      <a href="admin.html">Painel</a>
      <a href="cliente.html">Clientes</a>
      <a href="passeio.html">Passeios</a>
      <a href="venda.html">Vendas</a>
      <a href="#" class="btn-admin-link" onclick="logout()">Sair</a>
    </nav>
  </div>
</header>

<section class="secao secao-clara">
  <div class="container">

    <div class="card-admin-central">
      <div class="card-admin-topo">
        <h2>Cadastro de Clientes</h2>
      </div>

      <div class="card-admin-form">
        <input type="hidden" id="clienteId">

        <div class="form-grid-2">
          <div class="campo-form">
            <label>Nome</label>
            <input type="text" id="nomeCliente">
          </div>

          <div class="campo-form">
            <label>CPF</label>
            <input type="text" id="cpfCliente">
          </div>

          <div class="campo-form">
            <label>Data Nascimento</label>
            <input type="date" id="dataNascimentoCliente">
          </div>

          <div class="campo-form">
            <label>Telefone</label>
            <input type="text" id="telefoneCliente">
          </div>

          <div class="campo-form">
            <label>Email</label>
            <input type="email" id="emailCliente">
          </div>

          <div class="campo-form">
            <label>Cidade</label>
            <input type="text" id="cidadeCliente">
          </div>
        </div>

        <div class="acoes-login">
          <button class="btn-padrao" onclick="salvarCliente()">Salvar</button>
          <button class="btn-padrao btn-secundario" onclick="limparFormularioCliente()">Limpar</button>
        </div>

        <p id="mensagemCliente" class="mensagem mensagem-centralizada"></p>
      </div>
    </div>

    <div class="card-admin-central espacamento-topo">
      <div class="card-admin-topo">
        <h2>Lista de Clientes</h2>
      </div>

      <div class="card-admin-form">
        <div class="tabela-wrapper">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>CPF</th>
                <th>Telefone</th>
                <th>Email</th>
                <th>Cidade</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="tabelaClientes"></tbody>
          </table>
        </div>
      </div>
    </div>

  </div>
</section>

<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes - Encantos Rio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="verificarLogin(); listarClientes()">
  <header class="topo-interno">
    <h1>Cadastro de Clientes</h1>
    <nav class="menu">
      <a href="admin.html">Painel</a>
      <a href="cliente.html">Clientes</a>
      <a href="passeio.html">Passeios</a>
      <a href="venda.html">Vendas</a>
      <a href="#" onclick="logout()">Sair</a>
    </nav>
  </header>

    <main class="container pagina">
        <section class="form-section">
            <h2>Novo Cliente</h2>

            <form id="formCliente">
                <div class="grid-form">
                    <div>
                        <label for="nomeCliente">Nome</label>
                        <input type="text" id="nomeCliente" required>
                    </div>

                    <div>
                        <label for="cpfCliente">CPF</label>
                        <input type="text" id="cpfCliente" required>
                    </div>

                    <div>
                        <label for="dataNascimentoCliente">Data de Nascimento</label>
                        <input type="date" id="dataNascimentoCliente">
                    </div>

                    <div>
                        <label for="idiomaCliente">Idioma</label>
                        <input type="text" id="idiomaCliente">
                    </div>

                    <div>
                        <label for="enderecoCliente">Endereço</label>
                        <input type="text" id="enderecoCliente">
                    </div>

                    <div>
                        <label for="bairroCliente">Bairro</label>
                        <input type="text" id="bairroCliente">
                    </div>

                    <div>
                        <label for="cidadeCliente">Cidade</label>
                        <input type="text" id="cidadeCliente">
                    </div>

                    <div>
                        <label for="telefoneCliente">Telefone</label>
                        <input type="text" id="telefoneCliente">
                    </div>

                    <div>
                        <label for="emailCliente">Email</label>
                        <input type="email" id="emailCliente">
                    </div>
                </div>

                <button type="submit" class="btn">Cadastrar Cliente</button>
            </form>

            <p id="mensagemCliente" class="mensagem"></p>
        </section>

        <section class="busca-section">
            <h2>Buscar Cliente</h2>

            <div class="barra-busca">
                <input type="number" id="buscarIdCliente" placeholder="Buscar por ID">
                <button class="btn" onclick="buscarClientePorId()">Buscar ID</button>
            </div>

            <div class="barra-busca">
                <input type="text" id="buscarNomeCliente" placeholder="Buscar por nome">
                <button class="btn" onclick="buscarClientePorNome()">Buscar Nome</button>
            </div>

            <div class="barra-busca">
                <button class="btn" onclick="listarClientes()">Listar Todos</button>
            </div>
        </section>

        <section class="tabela-section">
            <h2>Lista de Clientes</h2>
            <div class="tabela-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>CPF</th>
                            <th>Cidade</th>
                            <th>Telefone</th>
                            <th>Email</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaClientes"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
